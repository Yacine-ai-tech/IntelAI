global:
  scrape_interval:     30s
  evaluation_interval: 30s
  scrape_timeout:      10s

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI backend — uses Docker service name (internal network)
  - job_name: omnitel-fastapi
    static_configs:
      - targets: ['omnitel-fastapi:8000']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout:  10s

  # n8n automation — built-in /metrics endpoint
  - job_name: omnitel-n8n
    static_configs:
      - targets: ['omnitel-n8n:5678']
    metrics_path: /metrics
    scrape_interval: 60s
    scrape_timeout:  10s

