# Render Blueprint — disaster-recovery / one-click redeploy (e.g. if the Railway credit runs out).
# Render builds from ./Dockerfile (which honors $PORT) and health-checks /health.
# No secrets live here: every key is `sync: false`, so Render prompts for the value in the dashboard.
# IntelAI loads ML when local rerank/embedding is on — on Render free (512MB) keep heavy ML OFF-box:
# set VECTOR_STORE=pgvector (Neon) + HOSTED_RERANK_PROVIDER=cohere (no local model). Bump to
# `plan: starter` only if you enable in-process models and see OOM.
services:
  - type: web
    name: intelai
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    autoDeploy: false
    envVars:
      - key: POSTGRES_URL          # Neon Postgres (also serves pgvector)
        sync: false
      - key: SECRET_KEY            # python -c "import secrets; print(secrets.token_hex(32))"
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS  # your Vercel frontend origin
        sync: false
      - key: VECTOR_STORE          # pgvector (prod, on Neon) keeps the app tier small
        value: pgvector
      - key: HOSTED_RERANK_PROVIDER # cohere|jina — off-Studio rerank backstop (see .env.example)
        sync: false
      - key: COHERE_API_KEY        # free, no-card key for the rerank backstop
        sync: false
