# ═══════════════════════════════════════════════════════════════════════
# OmniIntelOS 2026 — Docker Compose (WSL2 · Core i7 · 16 GB RAM)
#
# ⚠️  ALL SERVICES HAVE restart: "no"
#     Containers will NOT auto-start on OS/distro reboot.
#     Start manually:  docker compose up -d
#     Stop manually:   docker compose down
#
# Resource budget (total): ~1.4 CPU  ~2.0 GB RAM (Base: 2 CPU cores, 6GB RAM)
# Extension: ~2.0 CPU  ~3.0 GB RAM (3 CPU cores, 8GB RAM)
# ═══════════════════════════════════════════════════════════════════════

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "2"

services:

  # ────────────────────────────────────────────────────────────
  # 1. PostgreSQL — Users / Auth / Chat / Sessions
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnitel-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:           omniintelos
      POSTGRES_USER:         omniintel
      POSTGRES_PASSWORD:     ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_INITDB_ARGS:  "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    restart: "no"
    init: true
    cpus: "0.15"
    mem_limit: 192m
    mem_reservation: 64m
    pids_limit: 200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniintel -d omniintelos"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s
    networks:
      - omnitel-net
    # Improve DNS reliability inside containers (fallback to Google DNS)
    dns: [8.8.8.8, 1.1.1.1]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 2. FastAPI Backend
  # ────────────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnitel-fastapi:latest
    container_name: omnitel-fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - chroma-data:/app/chroma_db
    env_file: .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://omniintel:change_me_postgres_password@omnitel-postgres:5432/omniintelos}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    init: true
    cpus: "0.40"
    mem_limit: 640m
    mem_reservation: 192m
    pids_limit: 512
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    networks:
      - omnitel-net
    dns: [8.8.8.8, 1.1.1.1]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 3. React Frontend (nginx)
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: omnitel-frontend:latest
    container_name: omnitel-frontend
    ports:
      - "5173:5173"
    depends_on:
      fastapi:
        condition: service_healthy
    restart: "no"
    init: true
    cpus: "0.08"
    mem_limit: 128m
    mem_reservation: 48m
    pids_limit: 150
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - omnitel-net
    dns: [8.8.8.8, 1.1.1.1]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 4. Prometheus — Metrics Collection
  # ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: omnitel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --storage.tsdb.retention.size=128MB
      - --web.enable-lifecycle
      - --query.max-concurrency=5
    restart: "no"
    init: true
    cpus: "0.06"
    mem_limit: 160m
    mem_reservation: 64m
    pids_limit: 150
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - omnitel-net
    profiles: ["monitoring"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 6. Grafana — Monitoring Dashboards
  # ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: omnitel-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD:          ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana_password}
      GF_ANALYTICS_REPORTING_ENABLED:      "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:      "false"
      GF_USERS_ALLOW_SIGN_UP:              "false"
      GF_SERVER_ENABLE_GZIP:               "true"
      GF_UNIFIED_ALERTING_ENABLED:         "false"
      GF_ALERTING_ENABLED:                 "false"
      GF_LOG_LEVEL:                        warn
    restart: "no"
    init: true
    cpus: "0.08"
    mem_limit: 224m
    mem_reservation: 96m
    pids_limit: 200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - omnitel-net
    profiles: ["monitoring"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 7. n8n — Workflow Automation
  # ────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: omnitel-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n_workflows:/workflows:ro
    environment:
      N8N_HOST:                          "0.0.0.0"
      N8N_PORT:                          "5678"
      N8N_PROTOCOL:                      http
      N8N_EDITOR_BASE_URL:               ${PUBLIC_N8N_URL:-http://localhost:5678}
      N8N_PROXY_HOPS:                    "1"
      NODE_ENV:                          production
      WEBHOOK_URL:                       ${PUBLIC_N8N_URL:-http://localhost:5678/}
      N8N_BASIC_AUTH_ACTIVE:             "true"
      N8N_BASIC_AUTH_USER:               ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD:           ${N8N_BASIC_AUTH_PASSWORD:-change_me_n8n_password}
      N8N_METRICS:                       "true"
      N8N_DIAGNOSTICS_ENABLED:           "false"
      N8N_PERSONALIZATION_ENABLED:       "false"
      N8N_PUBLIC_API_ENABLED:            "true"
      N8N_API_KEY:                       ${N8N_API_KEY:-}
      EXECUTIONS_DATA_PRUNE:             "true"
      EXECUTIONS_DATA_MAX_AGE:           "168"
      N8N_HIRING_BANNER_ENABLED:         "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      NODE_OPTIONS:                      --max-old-space-size=384
    restart: "no"
    init: true
    cpus: "0.30"
    mem_limit: 768m
    mem_reservation: 192m
    pids_limit: 300
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5678/healthz', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  15s
      retries:  10
      start_period: 120s
    networks:
      - omnitel-net
    profiles: ["automation"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 8. OCR Service — Tesseract-based document processing
  # ────────────────────────────────────────────────────────────
  omnitel-ocr:
    build:
      context: .
      dockerfile: src/services/ocr/Dockerfile.ocr
    image: omnitel-ocr:latest
    container_name: omnitel-ocr
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads:ro
    restart: "no"
    init: true
    cpus: "0.25"
    mem_limit: 256m
    mem_reservation: 96m
    pids_limit: 200
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - omnitel-net
    profiles: ["ai"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 9. Voice Service — STT/TTS processing
  # ────────────────────────────────────────────────────────────
  omnitel-voice:
    build:
      context: .
      dockerfile: src/services/voice/Dockerfile.voice
    image: omnitel-voice:latest
    container_name: omnitel-voice
    ports:
      - "8002:8002"
    volumes:
      - ./uploads:/app/uploads:ro
    restart: "no"
    init: true
    cpus: "0.30"
    mem_limit: 384m
    mem_reservation: 128m
    pids_limit: 250
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8002/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - omnitel-net
    profiles: ["ai"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 10. Cloudflare Tunnel — Remote Access (Free Session-Based)
  # ────────────────────────────────────────────────────────────
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: omnitel-tunnel
    command: tunnel --no-autoupdate --metrics 0.0.0.0:4040 run --token ${CLOUDFLARE_TOKEN}
    network_mode: host
    environment:
      - TUNNEL_TRANSPORT_PROTOCOL=auto
      - TUNNEL_EDGE_IP_VERSION=auto
    restart: "no"
    init: true
    cpus: "0.05"
    mem_limit: 64m
    mem_reservation: 32m
    pids_limit: 100
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 60s
      timeout:  10s
      retries:  3
      start_period: 30s
    profiles: ["tunnel"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # 11. Cloudflare Tunnel — Permanent (Requires Account)
  # ────────────────────────────────────────────────────────────
  cloudflare-tunnel-permanent:
    image: cloudflare/cloudflared:latest
    container_name: omnitel-tunnel-permanent
    command: tunnel --no-autoupdate --metrics 0.0.0.0:4040 run --token ${CLOUDFLARE_PERMANENT_TOKEN}
    network_mode: host
    environment:
      - TUNNEL_TRANSPORT_PROTOCOL=auto
      - TUNNEL_EDGE_IP_VERSION=auto
    restart: unless-stopped
    init: true
    cpus: "0.10"
    mem_limit: 96m
    mem_reservation: 48m
    pids_limit: 100
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 60s
      timeout:  10s
      retries:  3
      start_period: 30s
    profiles: ["tunnel-permanent"]
    logging: *default-logging

  # ────────────────────────────────────────────────────────────
  # Development: Backend (hot-reload) — NOT started by default
  # Use: docker compose --profile dev up backend-dev
  # This service is on the "dev" profile and will NOT run unless the profile is specified.
  # It mounts the local source for fast edit/reload iterations.
  # ────────────────────────────────────────────────────────────
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: omnitel-fastapi:dev
    container_name: omnitel-fastapi-dev
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:delegated
      - ./data:/app/data:delegated
      - ./uploads:/app/uploads:delegated
    env_file: .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://omniintel:change_me_postgres_password@omnitel-postgres:5432/omniintelos}
    command: python -m uvicorn src.api.server_v2:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
    restart: "no"
    profiles: ["dev"]
    networks:
      - omnitel-net

  # ────────────────────────────────────────────────────────────
  # Development: Frontend (Vite hot-reload) — NOT started by default
  # Use: docker compose --profile dev up frontend-dev
  # Mounts local frontend folder and runs `npm run dev` listening on 0.0.0.0
  # ────────────────────────────────────────────────────────────
  frontend-dev:
    image: node:20-alpine
    container_name: omnitel-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://fastapi:8000
    command: sh -c "npm ci --prefer-offline --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: "no"
    profiles: ["dev"]
    networks:
      - omnitel-net

  # ────────────────────────────────────────────────────────────
  # Optional Dev HTTP proxy — provide consistent hostnames for dev
  # Use: docker compose --profile dev up dev-proxy
  # Proxies /api -> fastapi and / -> frontend-dev (Vite) for consistent hostnames
  # ────────────────────────────────────────────────────────────
  dev-proxy:
    image: nginx:1.27-alpine
    container_name: omnitel-dev-proxy
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dev-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: "no"
    profiles: ["dev"]
    networks:
      - omnitel-net

  # (dev-proxy already defined above with frontend/dev-nginx.conf)

# ── Networks ─────────────────────────────────────────────────
networks:
  omnitel-net:
    driver: bridge

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  n8n-data:
  chroma-data:
