# IntelAI — single-app stack (cloud-first).
#
# IntelAI is one deployable service (FastAPI + embedded ChromaDB). This compose is the
# optional "local full run" convenience: the app + a bundled Postgres.
#   - Studio dev (app only, Neon DB):  docker compose -f docker-compose.dev.yml up --build
#   - Production: ONE cloud service built from the Dockerfile (see railway.toml).
#
# For local full run, point the app at the bundled Postgres by setting this in .env:
#   POSTGRES_URL=postgresql://intelai:intelai@postgres:5432/intelai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: intelai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intelai}
      POSTGRES_DB: intelai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelai"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: intelai:latest
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      CHROMA_DB_PATH: /app/chroma_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
