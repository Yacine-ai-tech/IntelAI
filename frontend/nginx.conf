# ═══════════════════════════════════════════════════════════════
# IntelAI — nginx (React SPA + API proxy)
# gzip · long-cache static assets · WebSocket-aware API proxy · SPA routing
# ═══════════════════════════════════════════════════════════════

server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|ico|png|svg|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── API proxy → FastAPI (HTTP + WebSocket /api/v1/ws/chat) ─
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
    }

    # ── SPA fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
