# Dev nginx proxy: routes /api to backend-dev and / to frontend-dev (Vite)
server {
    listen 80;
    server_name _;

    # Proxy API requests to backend-dev
    location /api/ {
        proxy_pass http://backend-dev:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy n8n UI
    location /n8n/ {
        proxy_pass http://omnitel-n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests -> frontend dev server
    location / {
        proxy_pass http://frontend-dev:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
